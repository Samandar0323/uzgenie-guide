<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UzGenie — Profil</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:    #0d1117;
      --bg2:   #161b22;
      --bg3:   #1c2333;
      --text:  #e6edf3;
      --muted: #8b949e;
      --a1:    #2ca5e0;
      --a2:    #7b5cf0;
      --green: #3fb950;
      --orange:#d29922;
      --red:   #f85149;
      --grad:  linear-gradient(135deg,#2ca5e0,#7b5cf0);
      --r:     14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      min-height: 100vh;
      padding-bottom: 32px;
    }

    /* ── HEADER ── */
    .topbar {
      background: rgba(13,17,23,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 52px;
      position: sticky; top:0; z-index:10;
    }
    .logo { display:flex; align-items:center; gap:8px; }
    .logo-icon { width:30px;height:30px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:16px; }
    .logo-name { font-size:17px;font-weight:700;letter-spacing:-.4px; }
    .logo-name span { background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
    .topbar-title { font-size:15px;font-weight:600;color:var(--muted); }

    /* ── AVATAR BLOCK ── */
    .avatar-section {
      padding: 24px 16px 0;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
    }
    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 28px rgba(44,165,224,.3);
      margin-bottom: 14px;
    }
    .user-name { font-size: 22px; font-weight: 800; letter-spacing:-.5px; margin-bottom: 6px; }
    .sub-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 700;
    }
    .sub-admin   { background: rgba(210,153,34,.15); border:1px solid rgba(210,153,34,.3); color:#e3b341; }
    .sub-premium { background: rgba(44,165,224,.15); border:1px solid rgba(44,165,224,.3); color:#79c0ff; }
    .sub-free    { background: rgba(139,148,158,.12); border:1px solid rgba(139,148,158,.2); color:var(--muted); }

    /* ── INFO CARD ── */
    .section { padding: 16px 14px 0; }
    .card {
      background: var(--bg2);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 10px;
    }
    .card-head {
      padding: 12px 16px 10px;
      font-size: 10px; font-weight: 700;
      letter-spacing: .8px; text-transform: uppercase;
      color: var(--a1);
      border-bottom: 1px solid rgba(255,255,255,.05);
    }

    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 16px;
      border-bottom: 1px solid rgba(255,255,255,.04);
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: var(--muted); display:flex; align-items:center; gap:7px; }
    .info-val { font-weight: 600; color: var(--text); }

    /* ── PROGRESS CARD ── */
    .prog-item {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .prog-item:last-child { border-bottom: none; }
    .prog-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .prog-name { font-size: 14px; font-weight: 600; display:flex; align-items:center; gap:7px; }
    .prog-pct  { font-size: 13px; font-weight: 700; }
    .prog-sub  { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .bar-wrap  { height: 6px; background: var(--bg3); border-radius: 6px; overflow: hidden; }
    .bar-fill  {
      height: 100%; border-radius: 6px;
      background: var(--grad);
      transition: width .6s ease;
    }
    .bar-fill.green  { background: linear-gradient(90deg, #3fb950, #56d364); }
    .bar-fill.orange { background: linear-gradient(90deg, #d29922, #f0a030); }
    .bar-fill.red    { background: linear-gradient(90deg, #f85149, #ff6a5e); }

    .dot-green  { color: var(--green); }
    .dot-orange { color: var(--orange); }
    .dot-red    { color: var(--red); }

    /* ── TTS CARD ── */
    .tts-item {
      padding: 11px 16px;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .tts-item:last-child { border-bottom: none; }
    .tts-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; display:flex; align-items:center; gap:6px; }
    .tts-nums  { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .tts-used  { font-size:14px; font-weight:700; }
    .tts-max   { font-size:12px; color:var(--muted); }

    /* ── IMAGE STAT ── */
    .img-big {
      padding: 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .img-num { font-size: 32px; font-weight: 800; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .img-label { font-size: 13px; color:var(--muted); margin-top:2px; }
    .img-right { text-align:right; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <span class="logo-name">Uz<span>Genie</span></span>
  </div>
  <div class="topbar-title">Profil</div>
</div>

<div class="avatar-section">
  <div class="avatar" id="av">👤</div>
  <div class="user-name" id="uname">—</div>
  <div class="sub-badge sub-free" id="subBadge">🆓 Bepul</div>
</div>

<div class="section">

  <!-- Info -->
  <div class="card">
    <div class="card-head">Ma'lumotlar</div>
    <div class="info-row">
      <span class="info-key">📱 Telefon</span>
      <span class="info-val" id="phone">—</span>
    </div>
    <div class="info-row">
      <span class="info-key">🗓 Obuna tugashi</span>
      <span class="info-val" id="expiry">—</span>
    </div>
  </div>

  <!-- AI Usage -->
  <div class="card">
    <div class="card-head">Bugungi AI foydalanish</div>
    <div id="ai-progs"></div>
  </div>

  <!-- Image -->
  <div class="card">
    <div class="card-head">Rasm yaratish</div>
    <div class="img-big">
      <div>
        <div class="img-num" id="img-used">0</div>
        <div class="img-label">Bugun ishlatildi</div>
      </div>
      <div class="img-right">
        <div class="img-num" id="img-max">5</div>
        <div class="img-label">Kunlik limit</div>
      </div>
    </div>
    <div style="padding:0 16px 14px">
      <div class="bar-wrap">
        <div class="bar-fill" id="img-bar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- TTS -->
  <div class="card">
    <div class="card-head">Ovoz (oylik)</div>
    <div id="tts-block"></div>
  </div>

</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const p = new URLSearchParams(location.search);
const g = (k, def='') => p.get(k) || def;

/* ── User info ── */
const name  = g('name', 'Foydalanuvchi');
const sub   = g('sub',  'free');
const phone = g('phone', '—');
const expiry= g('expiry','—');

document.getElementById('uname').textContent = name;
document.getElementById('av').textContent = name[0]?.toUpperCase() || '👤';
document.getElementById('phone').textContent = phone;
document.getElementById('expiry').textContent =
  expiry === '—' ? (sub === 'free' ? '♾️ Doimiy bepul' : '—') : expiry + ' gacha';

const badge = document.getElementById('subBadge');
if (sub === 'admin') {
  badge.className = 'sub-badge sub-admin';
  badge.textContent = '👑 Admin';
} else if (sub === 'premium') {
  badge.className = 'sub-badge sub-premium';
  badge.textContent = '💎 Premium';
} else {
  badge.className = 'sub-badge sub-free';
  badge.textContent = '🆓 Bepul';
}

/* ── AI models ── */
const models = [
  { key:'groq',   icon:'⚡', name:'Groq Llama 3.3',  maxReq:14400,   maxTok:500000 },
  { key:'gemini', icon:'🔵', name:'Gemini 2.5 Flash', maxReq:1500,    maxTok:1000000 },
  { key:'qwen',   icon:'🟠', name:'GPT-OSS 120B',     maxReq:1000,    maxTok:500000 },
];

const aiBlock = document.getElementById('ai-progs');
models.forEach(m => {
  const req    = parseInt(g(`${m.key}_req`, 0));
  const tok    = parseInt(g(`${m.key}_tok`, 0));
  const pctReq = Math.min(100, req / m.maxReq * 100);
  const pctTok = Math.min(100, tok / m.maxTok * 100);
  const pct    = Math.max(pctReq, pctTok);
  const pctStr = pct.toFixed(1) + '%';
  const color  = pct >= 80 ? 'red' : pct >= 50 ? 'orange' : 'green';
  const dotCls = pct >= 80 ? 'dot-red' : pct >= 50 ? 'dot-orange' : 'dot-green';

  aiBlock.innerHTML += `
    <div class="prog-item">
      <div class="prog-top">
        <div class="prog-name"><span>${m.icon}</span>${m.name}</div>
        <div class="prog-pct ${dotCls}">${pctStr}</div>
      </div>
      <div class="prog-sub">
        So'rov: ${req.toLocaleString()}/${m.maxReq.toLocaleString()} &nbsp;·&nbsp;
        Token: ${tok.toLocaleString()}/${m.maxTok.toLocaleString()}
      </div>
      <div class="bar-wrap"><div class="bar-fill ${color}" style="width:${pct}%"></div></div>
    </div>`;
});

/* ── Image ── */
const imgUsed = parseInt(g('img_used', 0));
const imgMax  = sub === 'free' ? 5 : 9999;
const imgPct  = sub === 'free' ? Math.min(100, imgUsed / 5 * 100) : 0;
document.getElementById('img-used').textContent = imgUsed;
document.getElementById('img-max').textContent  = sub === 'free' ? '5' : '♾️';
document.getElementById('img-bar').style.width  = imgPct + '%';
const imgBarColor = imgPct >= 80 ? 'red' : imgPct >= 50 ? 'orange' : 'green';
document.getElementById('img-bar').classList.add(imgBarColor);

/* ── TTS ── */
const ELEVEN_LIMIT = 10000;
const e1    = parseInt(g('e1', 0));
const e2    = parseInt(g('e2', 0));
const edge  = parseInt(g('edge', 0));
const e1pct = Math.min(100, e1 / ELEVEN_LIMIT * 100);
const e2pct = Math.min(100, e2 / ELEVEN_LIMIT * 100);

function ttsBar(used, max, label) {
  const pct   = Math.min(100, used / max * 100);
  const color = pct >= 80 ? 'red' : pct >= 50 ? 'orange' : 'green';
  const left  = Math.max(0, max - used);
  return `
    <div class="tts-item">
      <div class="tts-label">🎙 ${label}</div>
      <div class="tts-nums">
        <span class="tts-used">${used.toLocaleString()} belgi</span>
        <span class="tts-max">qoldi: ${left.toLocaleString()}</span>
      </div>
      <div class="bar-wrap"><div class="bar-fill ${color}" style="width:${pct}%"></div></div>
    </div>`;
}

document.getElementById('tts-block').innerHTML =
  ttsBar(e1, ELEVEN_LIMIT, 'ElevenLabs — Kalit 1') +
  ttsBar(e2, ELEVEN_LIMIT, 'ElevenLabs — Kalit 2') +
  `<div class="tts-item">
     <div class="tts-label">🔊 Edge TTS &nbsp;<span style="color:var(--green);font-weight:700;">♾️ Cheksiz</span></div>
     <div class="tts-nums">
       <span class="tts-used">${edge.toLocaleString()} belgi</span>
       <span class="tts-max">limit yo'q</span>
     </div>
     <div class="bar-wrap"><div class="bar-fill green" style="width:${Math.min(100,edge/100000*100)}%"></div></div>
   </div>`;
</script>
</body>
</html>
