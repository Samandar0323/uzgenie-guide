    :root {
      --bg:      var(--tg-theme-bg-color,            #17212b);
      --bg2:     var(--tg-theme-secondary-bg-color,  #232e3c);
      --text:    var(--tg-theme-text-color,           #f5f5f5);
      --hint:    var(--tg-theme-hint-color,           #708499);
      --btn:     var(--tg-theme-button-color,         #2ca5e0);
      --btn-txt: var(--tg-theme-button-text-color,    #ffffff);
      --link:    var(--tg-theme-link-color,           #2ca5e0);
      --radius:  12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .logo { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
    .logo span { color: var(--btn); }

    .lang-row { display: flex; gap: 4px; }
    .lang-btn {
      padding: 5px 11px;
      border-radius: 20px;
      border: 1.5px solid transparent;
      background: transparent;
      color: var(--hint);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
    }
    .lang-btn.active {
      background: var(--btn);
      color: var(--btn-txt);
    }

    /* ── TABS ────────────────────────────────────────────────── */
    .tabs-wrap {
      background: var(--bg2);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .tabs {
      display: flex;
      overflow-x: auto;
      gap: 4px;
      padding: 10px 12px;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      white-space: nowrap;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,.12);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .18s;
      flex-shrink: 0;
    }
    .tab-btn.active {
      background: var(--btn);
      border-color: var(--btn);
      color: var(--btn-txt);
    }

    /* ── CONTENT ─────────────────────────────────────────────── */
    .content {
      padding: 14px 14px 32px;
      max-width: 640px;
      margin: 0 auto;
    }
    .section { display: none; }
    .section.active { display: block; }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 14px;
      margin-top: 4px;
    }

    /* ── CARD ────────────────────────────────────────────────── */
    .card {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--btn);
      text-transform: uppercase;
      letter-spacing: .7px;
      margin-bottom: 8px;
    }
    .card p {
      line-height: 1.55;
      color: var(--text);
    }
    .card ul { list-style: none; padding: 0; }
    .card ul li {
      line-height: 1.55;
      padding: 2px 0 2px 16px;
      position: relative;
    }
    .card ul li::before {
      content: "•";
      position: absolute;
      left: 2px;
      color: var(--btn);
      font-size: 13px;
    }

    /* ── BADGES ─────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      vertical-align: middle;
      margin-left: 4px;
    }
    .free  { background: rgba(52,199,89,.18);  color: #34c759; }
    .limit { background: rgba(255,159,10,.18); color: #ff9f0a; }

    /* ── STEP BLOCK ─────────────────────────────────────────── */
    .steps { counter-reset: step; }
    .step {
      display: flex;
      gap: 12px;
      padding: 6px 0;
      counter-increment: step;
    }
    .step-num {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--btn);
      color: var(--btn-txt);
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }
    .step-text { line-height: 1.5; color: var(--text); }

    /* ── MODEL CARD ─────────────────────────────────────────── */
    .model-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .model-card:last-child { border-bottom: none; padding-bottom: 0; }
    .model-icon {
      font-size: 22px;
      flex-shrink: 0;
      width: 36px;
      text-align: center;
    }
    .model-name { font-weight: 600; font-size: 15px; }
    .model-desc { color: var(--hint); font-size: 13px; margin-top: 2px; line-height: 1.4; }
  </style>
</head>

/* ── Render ──────────────────────────────────────────────────── */
function renderCard(card) {
  let inner = `<div class="card-label">${card.label}</div>`;

  if (card.models) {
    inner += card.models.map(m => `
      <div class="model-card">
        <div class="model-icon">${m.icon}</div>
        <div>
          <div class="model-name">${m.name}</div>
          <div class="model-desc">${m.desc}</div>
        </div>
      </div>`).join('');
  } else if (card.steps) {
    inner += `<div class="steps">${card.steps.map((s, i) => `
      <div class="step">
        <div class="step-num">${i + 1}</div>
        <div class="step-text">${s}</div>
      </div>`).join('')}</div>`;
  } else if (card.list) {
    inner += `<ul>${card.list.map(li => `<li>${li}</li>`).join('')}</ul>`;
  } else if (card.p) {
    inner += `<p>${card.p}</p>`;
  }

  return `<div class="card">${inner}</div>`;
}

function render() {
  const sections = DATA[lang];

  /* tabs */
  document.getElementById('tabs').innerHTML = sections.map((s, i) =>
    `<button class="tab-btn${i === activeTab ? ' active' : ''}" onclick="setTab(${i})">
       ${s.icon} ${s.title}
     </button>`
  ).join('');

  /* content */
  const sec = sections[activeTab];
  document.getElementById('content').innerHTML =
    `<div class="section active">
       <div class="section-title">${sec.icon} ${sec.title}</div>
       ${sec.cards.map(renderCard).join('')}
     </div>`;
}

function setLang(l) {
  lang = l;
  activeTab = 0;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === l);
  });
  render();
  window.scrollTo(0, 0);
}

function setTab(i) {
  activeTab = i;
  render();
  window.scrollTo(0, 64); // tabs height
}

/* ── Init ────────────────────────────────────────────────────── */
document.querySelectorAll('.lang-btn').forEach(b => {
  b.classList.toggle('active', b.textContent.toLowerCase() === lang);
});
render();
</script>
