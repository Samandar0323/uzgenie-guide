<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UzGenie</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:      #0d1117;
      --bg2:     #161b22;
      --bg3:     #1c2333;
      --border:  rgba(255,255,255,.07);
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #2ca5e0;
      --accent2: #58a6ff;
      --green:   #3fb950;
      --orange:  #d29922;
      --purple:  #bc8cff;
      --radius:  14px;
      --nav-h:   64px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    /* ── SCROLLBAR ───────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

    /* ── HEADER ─────────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(13,17,23,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 54px;
    }
    .logo-wrap { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #2ca5e0, #58a6ff);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -.4px; }
    .logo-text span { color: var(--accent); }

    .lang-pills { display: flex; gap: 2px; background: var(--bg3); padding: 3px; border-radius: 10px; }
    .lang-pill {
      padding: 4px 10px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
    }
    .lang-pill.active { background: var(--accent); color: #fff; }

    /* ── HERO ───────────────────────────────────────────────── */
    .hero {
      margin: 14px 14px 0;
      padding: 20px 18px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #0d2137 0%, #0f1923 50%, #1a1040 100%);
      border: 1px solid rgba(44,165,224,.2);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(44,165,224,.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -30px; left: -30px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(188,140,255,.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.4px;
      margin-bottom: 6px;
    }
    .hero-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .hero-badges { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
    .hbadge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid;
    }
    .hb-blue  { background: rgba(44,165,224,.12);  border-color: rgba(44,165,224,.3);  color: #7dd3f7; }
    .hb-green { background: rgba(63,185,80,.12);   border-color: rgba(63,185,80,.3);   color: #7ee787; }
    .hb-purp  { background: rgba(188,140,255,.12); border-color: rgba(188,140,255,.3); color: #d2a8ff; }

    /* ── TABS (horizontal scroll) ───────────────────────────── */
    .tabs-outer {
      position: sticky;
      top: 54px;
      z-index: 40;
      background: rgba(13,17,23,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      gap: 0;
      padding: 0 12px;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      border: none;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: color .18s;
      white-space: nowrap;
    }
    .tab.active { color: var(--text); }
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 12px; right: 12px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
    }

    /* ── MAIN ───────────────────────────────────────────────── */
    .main { padding: 14px 14px 24px; }
    .section { display: none; animation: fadeUp .2s ease; }
    .section.active { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SECTION TITLE ──────────────────────────────────────── */
    .sec-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .sec-icon {
      width: 38px; height: 38px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .ic-blue   { background: linear-gradient(135deg, rgba(44,165,224,.25), rgba(88,166,255,.15)); }
    .ic-pink   { background: linear-gradient(135deg, rgba(255,100,130,.25), rgba(255,150,100,.15)); }
    .ic-teal   { background: linear-gradient(135deg, rgba(50,200,180,.25), rgba(30,160,200,.15)); }
    .ic-green  { background: linear-gradient(135deg, rgba(63,185,80,.25),  rgba(40,220,100,.15)); }
    .ic-orange { background: linear-gradient(135deg, rgba(210,153,34,.25), rgba(255,180,50,.15)); }
    .ic-purp   { background: linear-gradient(135deg, rgba(188,140,255,.25),rgba(100,120,255,.15)); }

    .sec-title { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }

    /* ── CARD ───────────────────────────────────────────────── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 3px 0 0 3px;
    }
    .card.c-green::before  { background: var(--green); }
    .card.c-orange::before { background: var(--orange); }
    .card.c-purple::before { background: var(--purple); }
    .card.c-none::before   { display: none; }

    .card-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .card.c-green  .card-label { color: var(--green); }
    .card.c-orange .card-label { color: var(--orange); }
    .card.c-purple .card-label { color: var(--purple); }

    .card p { font-size: 14px; line-height: 1.6; color: var(--muted); }
    .card p b { color: var(--text); font-weight: 600; }

    /* ── LIST ───────────────────────────────────────────────── */
    .card ul { list-style: none; }
    .card ul li {
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
      padding: 3px 0 3px 18px;
      position: relative;
    }
    .card ul li::before {
      content: '';
      position: absolute;
      left: 4px; top: 11px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }
    .card.c-green  ul li::before { background: var(--green); }
    .card.c-orange ul li::before { background: var(--orange); }

    /* ── STEPS ──────────────────────────────────────────────── */
    .steps { display: flex; flex-direction: column; gap: 10px; }
    .step  { display: flex; gap: 12px; align-items: flex-start; }
    .step-n {
      flex-shrink: 0;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .step-t { font-size: 14px; line-height: 1.6; color: var(--muted); padding-top: 2px; }

    /* ── MODEL CARDS ────────────────────────────────────────── */
    .models { display: flex; flex-direction: column; gap: 0; }
    .model {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .model:last-child { border-bottom: none; padding-bottom: 0; }
    .model-ico {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      background: var(--bg3);
    }
    .model-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .model-desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

    /* ── DIVIDER ────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    /* ── INFO ROW ───────────────────────────────────────────── */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: var(--muted); }
    .info-val { font-weight: 600; color: var(--text); }
    .badge-free   { color: var(--green);  font-size: 12px; }
    .badge-limit  { color: var(--orange); font-size: 12px; }
  </style>
</head>

/* ── RENDER ──────────────────────────────────────────────────── */
function renderCard(c) {
  const cls = `card ${c.color||''}`;
  let body = `<div class="card-label">${c.label}</div>`;

  if (c.models) {
    body += `<div class="models">${c.models.map(m=>`
      <div class="model">
        <div class="model-ico">${m.ico}</div>
        <div><div class="model-name">${m.name}</div><div class="model-desc">${m.desc}</div></div>
      </div>`).join('')}</div>`;
  } else if (c.steps) {
    body += `<div class="steps">${c.steps.map((s,i)=>`
      <div class="step"><div class="step-n">${i+1}</div><div class="step-t">${s}</div></div>`
    ).join('')}</div>`;
  } else if (c.rows) {
    body += c.rows.map(([k,v])=>`
      <div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`
    ).join('');
  } else if (c.list) {
    body += `<ul>${c.list.map(i=>`<li>${i}</li>`).join('')}</ul>`;
  } else if (c.p) {
    body += `<p>${c.p}</p>`;
  }

  return `<div class="${cls}">${body}</div>`;
}

function render() {
  const d = D[lang];

  // tabs
  document.getElementById('tabs').innerHTML = d.tabs.map((t,i)=>
    `<button class="tab${i===tab?' active':''}" onclick="setTab(${i})">${t}</button>`
  ).join('');

  // section
  const s = d.sections[tab];
  const heroD = d.hero;

  document.getElementById('main').innerHTML = `
    <div class="hero">
      <div class="hero-title">${heroD.title}</div>
      <div class="hero-sub">${heroD.sub}</div>
      <div class="hero-badges">
        ${heroD.badges.map((b,i)=>`<span class="hbadge ${['hb-blue','hb-green','hb-purp'][i]||'hb-blue'}">${b}</span>`).join('')}
      </div>
    </div>
    <div style="height:14px"></div>
    <div class="sec-head">
      <div class="sec-icon ${s.ic}">${s.icon}</div>
      <div class="sec-title">${s.title}</div>
    </div>
    ${s.cards.map(renderCard).join('')}
  `;
}

function setLang(l) {
  lang = l;
  tab  = 0;
  document.querySelectorAll('.lang-pill').forEach(b=>
    b.classList.toggle('active', b.textContent.toLowerCase()===l)
  );
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function setTab(i) {
  tab = i;
  render();
  window.scrollTo({top: 108, behavior:'smooth'});
}

// Init
document.querySelectorAll('.lang-pill').forEach(b=>
  b.classList.toggle('active', b.textContent.toLowerCase()===lang)
);
render();
